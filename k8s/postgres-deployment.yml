# postgres-deployment.yml
# PostgreSQL 데이터베이스 Pod 및 Service 정의
#   - 공식 postgres 이미지를 사용
#   - 위에서 만든 PVC(postgres-pvc)에 데이터를 저장

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deploy
  namespace: django-ns
spec:
  replicas: 1                            # DB는 1개 인스턴스로 운용
  selector:
    matchLabels:
      app: postgres                      # 이 라벨을 가진 Pod를 관리
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine      # 가벼운 알파인 기반 PostgreSQL
          ports:
            - containerPort: 5432        # PostgreSQL 기본 포트
          env:
            # PostgreSQL 컨테이너 설정용 환경 변수
            - name: POSTGRES_DB
              value: "django_db"         # 초기 생성할 DB 이름
            - name: POSTGRES_USER
              value: "django_user"       # 접속 계정
            - name: POSTGRES_PASSWORD
              value: "django1234"        # 접속 비밀번호
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data  # DB 데이터가 저장될 경로
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc      # 위에서 만든 PVC와 연결

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service                 # Django에서 접속할 서비스 이름
  namespace: django-ns
spec:
  selector:
    app: postgres                        # 위 Deployment의 라벨과 일치
  ports:
    - name: postgres
      port: 5432                         # 클러스터 내부에서 사용할 포트
      targetPort: 5432                   # 컨테이너 포트
  type: ClusterIP                        # 내부 통신용 Service
