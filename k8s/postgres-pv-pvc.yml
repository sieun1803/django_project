# postgres-pv-pvc.yml
# PostgreSQL 데이터베이스용 영구 스토리지 정의 (PV + PVC)
#   - hostPath 를 사용해 워커 노드 로컬 디스크를 스토리지로 사용
#   - 학습용/테스트용 구성에 적합

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv                    # PV 이름
spec:
  capacity:
    storage: 5Gi                       # 저장 용량 (5GB)
  accessModes:
    - ReadWriteOnce                    # 하나의 노드에서 읽기/쓰기
  persistentVolumeReclaimPolicy: Retain  # PVC 삭제 후에도 데이터 유지
  hostPath:
    path: /data/postgres               # 워커 노드의 실제 디렉터리 경로

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc                   # PVC 이름
  namespace: django-ns                 # Django 앱과 같은 네임스페이스 사용
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi                     # 요청하는 스토리지 용량
