apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-deploy
  namespace: django-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-app
  template:
    metadata:
      labels:
        app: django-app
    spec:
      containers:
        - name: django
          image: sieun1803/django-k8s-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            # ------------------------------
            # PostgreSQL 접속 정보 (Django용)
            #   - settings.py 에서 os.environ 으로 읽어감
            # ------------------------------
            - name: POSTGRES_DB
              value: "django_db"
            - name: POSTGRES_USER
              value: "django_user"
            - name: POSTGRES_PASSWORD
              value: "django1234"
            - name: POSTGRES_HOST
              value: "postgres-service"   # 위에서 만든 Service 이름
            - name: POSTGRES_PORT
              value: "5432"
